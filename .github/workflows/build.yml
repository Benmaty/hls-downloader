name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ffmpeg binary for Android ARM64
        run: |
          mkdir -p app/src/main/assets
          wget -q "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-arm64" -O app/src/main/assets/ffmpeg || \
          wget -q "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz" -O /tmp/ffmpeg.tar.xz && \
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp && \
          cp /tmp/ffmpeg-*-arm64-static/ffmpeg app/src/main/assets/ffmpeg
          chmod +x app/src/main/assets/ffmpeg

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          sudo mv gradle-8.2 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HLS-Downloader
          path: app/build/outputs/apk/release/*.apk
