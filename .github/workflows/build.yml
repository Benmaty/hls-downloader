name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ffmpeg binary for Android ARM64
        run: |
          mkdir -p app/src/main/assets
          wget -q "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz" -O /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          cp /tmp/ffmpeg-*-arm64-static/ffmpeg app/src/main/assets/ffmpeg
          chmod +x app/src/main/assets/ffmpeg

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          sudo mv gradle-8.2 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -alias hlskey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass hlspassword \
            -keypass hlspassword \
            -dname "CN=Benmaty, OU=Dev, O=HLS, L=Paris, S=IDF, C=FR"

      - name: Build & Sign APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease

          # Signer l'APK
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks app/keystore.jks \
            --ks-key-alias hlskey \
            --ks-pass pass:hlspassword \
            --key-pass pass:hlspassword \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HLS-Downloader
          path: app/build/outputs/apk/release/app-release-signed.apk
